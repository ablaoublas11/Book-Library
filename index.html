<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Library</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header-container">
      <div class="title">
        <h2>
          <span>Book Library</span>
        </h2>
      </div>
      <div class="add-btn">
        <button class="add-book">Add Book</button>
      </div>
    </header>
    <main class="main-container">
      <div id="bookShowingArea"></div>
      <div class="insertBook">
        <input id="name" placeholder="Enter book's name....." />
        <input id="author" placeholder="Enter book's author....." />
        <input
          id="numOfPages"
          placeholder="Enter book's number of pages....."
        />
        <button id="addBook">Add</button>
      </div>
    </main>
    <footer class="footer-container">
      <span>Created by Chris</span>
    </footer>
    <script src="./index.js"></script>
  </body>
</html>
